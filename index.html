<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronofauna — A Timeline of Prehistoric Life</title>
    <meta
      name="description"
      content="An interactive, zoomable timeline of prehistoric life showing when each species lived and which ones overlapped."
    />
    <script>
      // Runs before first paint so a dark-mode reader never sees a white flash.
      // Mirrors the resolution order in src/hooks/useTheme.ts.
      (function () {
        try {
          var choice = localStorage.getItem("chronofauna-theme");
          var dark =
            choice === "light" || choice === "dark"
              ? choice === "dark"
              : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
